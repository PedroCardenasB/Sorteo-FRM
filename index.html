<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorteo - Proyecto Socioambiental</title>
  <script type="text/javascript" src="https://ff.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=f7iTxSJQkOdMTPkmJGdzsYvMnYBrHHYUL_wuj15vbUHEd7nC8QJrREsN7_16MoyPzahOX6rcigXjIBIq63cYbWgN78BJYe6FgxVG89XFZfGu-MxbA6kTnLxaxZUPVXqyyP-jduMuVRLiaVXLe60FFDOsUCUb8iWnoTMgurGLRxCxtiHBDgaQtSs7Bs4eoMm4eoyAywAJnv-ygn9sr0P12wFe9bKl5-6LZBzEctCWv6erA0ZiyplIUAF6jKB7B0F1rK8vSgOMsfGBV9Miveyg4w" charset="UTF-8"></script><style>
    :root{
      --sky:#dff5ef;
      --sky2:#bfe4dc;
      --soil:#8b5a2b;
      --soil2:#5b371c;
      --green:#2f8f46;
      --green2:#77b85a;
      --darkgreen:#1f5d35;
      --blue:#5aaed0;
      --yellow:#f2c94c;
      --orange:#dc8a3d;
      --paper:#fff8e5;
      --ink:#1e2b24;
      --line:#2b2b2b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI", Arial, sans-serif;
      background:linear-gradient(var(--sky),var(--sky2));
      color:var(--ink);
      overflow:hidden;
    }

    .app{
      position:relative;
      min-height:100vh;
      padding:20px clamp(14px,3vw,40px) 24px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:10px;
    }

    .title{
      position:relative;
      z-index:10;
      width:min(1050px,96vw);
      margin:0 auto;
      text-align:center;
      text-transform:uppercase;
      font-weight:950;
      letter-spacing:.8px;
      font-size:clamp(1.1rem,2.6vw,2.1rem);
      background:rgba(255,248,229,.95);
      border:3px solid var(--line);
      border-radius:22px;
      padding:12px 18px;
      box-shadow:0 8px 0 rgba(0,0,0,.16);
    }

    .landscape{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:0;
    }

    .sun{
      position:absolute;
      right:7vw;
      top:96px;
      width:92px;
      height:92px;
      background:var(--yellow);
      border-radius:50%;
      box-shadow:0 0 0 15px rgba(242,201,76,.25),0 0 45px rgba(242,201,76,.85);
    }

    .cloud{
      position:absolute;
      background:white;
      border-radius:999px;
      opacity:.88;
      animation:cloud 34s linear infinite;
    }
    .cloud::before,.cloud::after{
      content:"";
      position:absolute;
      background:white;
      border-radius:50%;
    }
    .cloud.one{width:150px;height:42px;left:-170px;top:105px}
    .cloud.one::before{width:70px;height:70px;left:24px;top:-35px}
    .cloud.one::after{width:92px;height:92px;left:68px;top:-49px}
    .cloud.two{width:210px;height:52px;left:-260px;top:175px;animation-delay:10s;animation-duration:42s}
    .cloud.two::before{width:92px;height:92px;left:34px;top:-48px}
    .cloud.two::after{width:115px;height:115px;left:92px;top:-64px}
    @keyframes cloud{to{transform:translateX(125vw)}}

    .ground{
      position:absolute;
      left:-5vw;
      right:-5vw;
      bottom:0;
      height:34vh;
      background:
        linear-gradient(transparent 0 18%, rgba(0,0,0,.08) 18% 20%, transparent 20%),
        linear-gradient(165deg,var(--soil) 0 55%,var(--soil2) 56%);
      border-top:5px solid var(--line);
    }

    .river{
      position:absolute;
      left:-10vw;
      right:-10vw;
      bottom:29vh;
      height:70px;
      background:linear-gradient(90deg,#58b9d1,#87d6e6,#58b9d1);
      border-top:4px solid var(--line);
      border-bottom:4px solid var(--line);
      transform:skewY(-2deg);
      opacity:0;
      transition:1s ease;
    }

    .stage{
      position:relative;
      z-index:2;
      display:grid;
      grid-template-columns:minmax(295px,420px) 1fr;
      gap:24px;
      align-items:end;
      min-height:0;
    }

    .panel{
      align-self:center;
      background:rgba(255,248,229,.96);
      border:4px solid var(--line);
      border-radius:28px;
      padding:18px;
      box-shadow:0 12px 0 rgba(0,0,0,.17),0 22px 45px rgba(0,0,0,.16);
    }

    .panel h2{
      margin:0 0 12px;
      text-align:center;
      text-transform:uppercase;
      font-size:1.42rem;
    }

    .screen{
      min-height:210px;
      background:#e7fff0;
      border:4px solid var(--line);
      border-radius:22px;
      display:grid;
      place-items:center;
      text-align:center;
      padding:18px;
      position:relative;
      overflow:hidden;
      box-shadow:inset 0 0 25px rgba(47,143,70,.25);
    }

    .screen.rolling::before{
      content:"";
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(0deg,rgba(47,143,70,.16) 0 8px,transparent 8px 16px);
      animation:scan .28s linear infinite;
    }
    @keyframes scan{to{transform:translateY(16px)}}

    .mini{
      position:relative;
      z-index:1;
      font-size:1rem;
      font-weight:850;
      text-transform:uppercase;
      opacity:.86;
    }

    .group{
      position:relative;
      z-index:1;
      font-size:clamp(2.2rem,5vw,4rem);
      font-weight:1000;
      color:var(--green);
      line-height:1;
      margin:6px 0;
    }

    .name{
      position:relative;
      z-index:1;
      font-size:clamp(1.05rem,2.4vw,1.55rem);
      font-weight:900;
      min-height:50px;
      display:grid;
      place-items:center;
    }

    .name.roll{animation:rollName .1s infinite linear}
    @keyframes rollName{
      from{transform:translateY(-10px);opacity:.6}
      to{transform:translateY(10px);opacity:1}
    }

    button{
      margin:18px auto 0;
      display:block;
      width:min(285px,100%);
      min-height:66px;
      border:4px solid var(--line);
      border-radius:18px;
      background:linear-gradient(#f8dd6f,#dc8a3d);
      color:#1b1b1b;
      font-weight:1000;
      font-size:1.18rem;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 8px 0 rgba(0,0,0,.25);
      transition:.12s;
    }
    button:active{transform:translateY(7px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
    button:disabled{opacity:.6;filter:grayscale(.8);cursor:not-allowed}

    .progress{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }

    .step{
      min-height:58px;
      border:3px solid var(--line);
      border-radius:14px;
      padding:8px 6px;
      background:#fff;
      text-align:center;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:.84rem;
    }
    .step.done{background:#d8f8d9;color:#1f6c34}

    .project{
      position:relative;
      height:72vh;
      min-height:520px;
    }

    .phaseText{
      position:absolute;
      left:50%;
      top:18px;
      transform:translateX(-50%);
      z-index:5;
      background:rgba(255,248,229,.97);
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 18px;
      font-weight:1000;
      text-transform:uppercase;
      text-align:center;
      box-shadow:0 6px 0 rgba(0,0,0,.16);
      width:min(560px,88%);
      transition:.8s;
    }

    .seedbed{
      position:absolute;
      left:50%;
      bottom:22vh;
      transform:translateX(-50%);
      width:min(720px,92%);
      height:160px;
      background:linear-gradient(#84c85f,#3d9d4e);
      border:4px solid var(--line);
      border-radius:50% 50% 12px 12px;
      opacity:.85;
    }

    .idea-card{
      position:absolute;
      left:50%;
      bottom:calc(22vh + 185px);
      transform:translateX(-50%);
      width:min(430px,70%);
      background:rgba(255,248,229,.96);
      border:4px solid var(--line);
      border-radius:20px;
      padding:15px;
      text-align:center;
      font-weight:900;
      box-shadow:0 8px 0 rgba(0,0,0,.16);
      transition:1s ease;
    }

    .seed{
      position:absolute;
      left:50%;
      bottom:calc(22vh + 62px);
      width:42px;
      height:58px;
      transform:translateX(-50%) rotate(-18deg) scale(1);
      background:#9b6a35;
      border:4px solid var(--line);
      border-radius:70% 30% 70% 30%;
      transition:1.1s cubic-bezier(.17,.84,.35,1.2);
      z-index:2;
    }

    .sprout, .trunk, .canopy, .fruit, .roots, .people, .sign, .path, .solar-flower, .water-drop{
      position:absolute;
      transition:1.2s cubic-bezier(.17,.84,.35,1.18);
    }

    .roots{
      left:50%;
      bottom:calc(22vh + 55px);
      width:220px;
      height:70px;
      transform:translateX(-50%) scale(0);
      opacity:0;
      border-bottom:6px solid #4d2d16;
      border-radius:0 0 50% 50%;
    }
    .roots::before,.roots::after{
      content:"";
      position:absolute;
      bottom:0;
      width:100px;
      height:55px;
      border-bottom:5px solid #4d2d16;
      border-radius:0 0 80% 80%;
    }
    .roots::before{left:5px;transform:rotate(18deg)}
    .roots::after{right:5px;transform:rotate(-18deg)}

    .sprout{
      left:50%;
      bottom:calc(22vh + 88px);
      width:22px;
      height:105px;
      transform:translateX(-50%) scaleY(0);
      transform-origin:bottom;
      background:var(--green);
      border:4px solid var(--line);
      border-radius:20px;
      z-index:3;
    }
    .sprout::before,.sprout::after{
      content:"";
      position:absolute;
      width:72px;
      height:42px;
      background:#63b85d;
      border:4px solid var(--line);
      border-radius:100% 0 100% 0;
      top:30px;
    }
    .sprout::before{right:12px;transform:rotate(-16deg)}
    .sprout::after{left:12px;transform:scaleX(-1) rotate(-16deg)}

    .trunk{
      left:50%;
      bottom:calc(22vh + 80px);
      width:55px;
      height:255px;
      transform:translateX(-50%) scaleY(0);
      transform-origin:bottom;
      background:linear-gradient(90deg,#7a4d28,#a06b3c);
      border:4px solid var(--line);
      border-radius:24px 24px 8px 8px;
      z-index:3;
    }

    .canopy{
      left:50%;
      bottom:calc(22vh + 260px);
      width:min(440px,58vw);
      height:250px;
      transform:translateX(-50%) scale(0);
      opacity:0;
      background:#3d9d4e;
      border:5px solid var(--line);
      border-radius:50%;
      z-index:4;
      box-shadow:
        -120px 48px 0 #58af57,
        -120px 48px 0 5px var(--line),
        120px 48px 0 #58af57,
        120px 48px 0 5px var(--line),
        0 86px 0 #2f8f46,
        0 86px 0 5px var(--line);
    }

    .fruit{
      width:28px;
      height:28px;
      border-radius:50%;
      background:var(--yellow);
      border:3px solid var(--line);
      opacity:0;
      transform:scale(0);
      z-index:6;
    }
    .f1{left:41%;bottom:calc(22vh + 410px)}
    .f2{left:56%;bottom:calc(22vh + 455px);background:#e66b5b}
    .f3{left:62%;bottom:calc(22vh + 365px);background:#5aaed0}
    .f4{left:47%;bottom:calc(22vh + 340px);background:#f2c94c}

    .water-drop{
      left:22%;
      bottom:calc(22vh + 210px);
      width:46px;
      height:64px;
      background:#58b9d1;
      border:4px solid var(--line);
      border-radius:60% 60% 60% 0;
      transform:rotate(-45deg) scale(0);
      opacity:0;
      z-index:2;
    }

    .solar-flower{
      right:19%;
      bottom:calc(22vh + 120px);
      width:105px;
      height:105px;
      border-radius:50%;
      background:var(--yellow);
      border:4px solid var(--line);
      transform:scale(0);
      opacity:0;
      z-index:2;
    }
    .solar-flower::before{
      content:"";
      position:absolute;
      inset:-24px;
      background:
        linear-gradient(var(--yellow),var(--yellow)) center top/18px 28px no-repeat,
        linear-gradient(var(--yellow),var(--yellow)) center bottom/18px 28px no-repeat,
        linear-gradient(90deg,var(--yellow),var(--yellow)) left center/28px 18px no-repeat,
        linear-gradient(90deg,var(--yellow),var(--yellow)) right center/28px 18px no-repeat;
    }
    .solar-flower::after{
      content:"";
      position:absolute;
      left:50%;
      top:100%;
      width:18px;
      height:92px;
      transform:translateX(-50%);
      background:var(--green);
      border:3px solid var(--line);
      z-index:-1;
    }

    .path{
      left:50%;
      bottom:0;
      width:190px;
      height:22vh;
      transform:translateX(-50%) scaleY(0);
      transform-origin:top;
      background:#d7c38c;
      border-left:4px solid var(--line);
      border-right:4px solid var(--line);
      clip-path:polygon(35% 0,65% 0,100% 100%,0 100%);
      opacity:.95;
    }

    .people{
      left:65%;
      bottom:20vh;
      width:150px;
      height:100px;
      transform:translateY(150px);
      opacity:0;
      z-index:8;
    }
    .person{
      position:absolute;
      bottom:0;
      width:42px;
      height:72px;
    }
    .person::before{
      content:"";
      position:absolute;
      top:0;
      left:10px;
      width:24px;
      height:24px;
      border-radius:50%;
      background:#f0b98d;
      border:3px solid var(--line);
    }
    .person::after{
      content:"";
      position:absolute;
      bottom:0;
      left:5px;
      width:34px;
      height:48px;
      background:#5aaed0;
      border:3px solid var(--line);
      border-radius:14px 14px 4px 4px;
    }
    .person.p2{left:48px;transform:scale(.92)}
    .person.p2::after{background:#dc8a3d}
    .person.p3{left:92px;transform:scale(.85)}
    .person.p3::after{background:#2f8f46}

    .sign{
      right:7%;
      bottom:20vh;
      width:205px;
      min-height:92px;
      transform:translateY(160px) rotate(4deg);
      opacity:0;
      background:#fff8e5;
      border:4px solid var(--line);
      border-radius:14px;
      padding:10px;
      font-weight:900;
      text-align:center;
      box-shadow:0 7px 0 rgba(0,0,0,.18);
      z-index:8;
    }
    .sign::after{
      content:"";
      position:absolute;
      left:50%;
      top:100%;
      width:16px;
      height:80px;
      transform:translateX(-50%);
      background:#7a4d28;
      border:3px solid var(--line);
      z-index:-1;
    }

    .phase-1 .idea-card{transform:translateX(-50%) translateY(-10px)}
    .phase-1 .seed{transform:translateX(-50%) rotate(0deg) scale(.8)}
    .phase-1 .roots{transform:translateX(-50%) scale(1);opacity:1}

    .phase-2 .river{opacity:1}
    .phase-2 .idea-card{opacity:.78;transform:translateX(-50%) translateY(-20px) scale(.92)}
    .phase-2 .seed{transform:translateX(-50%) rotate(0deg) scale(.2);opacity:0}
    .phase-2 .roots{transform:translateX(-50%) scale(1);opacity:1}
    .phase-2 .sprout{transform:translateX(-50%) scaleY(1)}
    .phase-2 .water-drop{transform:rotate(-45deg) scale(1);opacity:1}

    .phase-3 .river{opacity:1}
    .phase-3 .idea-card{opacity:0;transform:translateX(-50%) translateY(-40px) scale(.8)}
    .phase-3 .seed{transform:translateX(-50%) rotate(0deg) scale(.2);opacity:0}
    .phase-3 .roots{transform:translateX(-50%) scale(1);opacity:1}
    .phase-3 .sprout{transform:translateX(-50%) scaleY(0);opacity:0}
    .phase-3 .trunk{transform:translateX(-50%) scaleY(1)}
    .phase-3 .canopy{transform:translateX(-50%) scale(1);opacity:1}
    .phase-3 .path{transform:translateX(-50%) scaleY(1)}
    .phase-3 .water-drop{transform:rotate(-45deg) scale(1);opacity:1}

    .phase-4 .river{opacity:1}
    .phase-4 .idea-card{opacity:0;transform:translateX(-50%) translateY(-40px) scale(.8)}
    .phase-4 .seed{transform:translateX(-50%) rotate(0deg) scale(.2);opacity:0}
    .phase-4 .roots{transform:translateX(-50%) scale(1);opacity:1}
    .phase-4 .sprout{transform:translateX(-50%) scaleY(0);opacity:0}
    .phase-4 .trunk{transform:translateX(-50%) scaleY(1)}
    .phase-4 .canopy{transform:translateX(-50%) scale(1);opacity:1}
    .phase-4 .path{transform:translateX(-50%) scaleY(1)}
    .phase-4 .fruit{transform:scale(1);opacity:1}
    .phase-4 .people{transform:translateY(0);opacity:1}
    .phase-4 .sign{transform:translateY(0) rotate(4deg);opacity:1}
    .phase-4 .solar-flower{transform:scale(1);opacity:1}
    .phase-4 .water-drop{transform:rotate(-45deg) scale(1);opacity:1}

    .spark{
      position:fixed;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--yellow);
      pointer-events:none;
      z-index:20;
      animation:spark .9s ease-out forwards;
    }
    @keyframes spark{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}

    @media(max-width:900px){
      body{overflow:auto}
      .stage{grid-template-columns:1fr}
      .project{height:58vh;min-height:430px}
      .panel{align-self:start}
      .phaseText{top:8px}
      .canopy{width:330px;height:200px}
      .sign{right:2%;width:165px}
    }
  </style>
</head>
<body>
  <div class="app phase-0" id="app">
    <div class="landscape">
      <div class="sun"></div>
      <div class="cloud one"></div>
      <div class="cloud two"></div>
      <div class="river"></div>
      <div class="ground"></div>
    </div>

    <h1 class="title">Formulación y evaluación de proyectos socioambientales</h1>

    <main class="stage">
      <section class="panel">
        <h2>Sorteo de expositores</h2>
        <div class="screen" id="screen">
          <div>
            <div class="mini" id="mini">Etapa inicial</div>
            <div class="group" id="group">G1</div>
            <div class="name" id="name">Presiona sortear para iniciar</div>
          </div>
        </div>
        <button id="btn">Sortear</button>
        <div class="progress" id="progress"></div>
      </section>

      <section class="project" aria-label="Evolución del proyecto socioambiental">
        <div class="phaseText" id="phaseText">Idea semilla del proyecto</div>
        <div class="seedbed"></div>
        <div class="idea-card">Una idea socioambiental empieza como una semilla</div>
        <div class="seed"></div>
        <div class="roots"></div>
        <div class="sprout"></div>
        <div class="trunk"></div>
        <div class="canopy"></div>
        <div class="fruit f1"></div>
        <div class="fruit f2"></div>
        <div class="fruit f3"></div>
        <div class="fruit f4"></div>
        <div class="water-drop"></div>
        <div class="solar-flower"></div>
        <div class="path"></div>
        <div class="people">
          <div class="person p1"></div>
          <div class="person p2"></div>
          <div class="person p3"></div>
        </div>
        <div class="sign">Proyecto socioambiental sostenible</div>
      </section>
    </main>
  </div>

  <script>
    const grupos = [
      {
        grupo: "G1",
        nombres: ["Gabriela Margarita Parroquiano Poveda", "Erika Viviana Antonio Lemus", "Oscar Joel Lasprilla Argote"],
        elegido: "Oscar Joel Lasprilla Argote",
        fase: "Diagnóstico: la idea echa raíces"
      },
      {
        grupo: "G2",
        nombres: ["David Santiago Lozano Beltran", "Laura Sofía Gonzalez Díaz"],
        elegido: "Laura Sofía Gonzalez Díaz",
        fase: "Formulación: la semilla se convierte en brote"
      },
      {
        grupo: "G3",
        nombres: ["Brayan Stiven Hernandez Castillo", "Julieth Camila Vaca Méndez"],
        elegido: "Julieth Camila Vaca Méndez",
        fase: "Implementación: el proyecto crece"
      },
      {
        grupo: "G4",
        nombres: ["Laura Fernanda Talero Pirajan", "Jhon Alexander Dokoe Ortiz"],
        elegido: "Jhon Alexander Dokoe Ortiz",
        fase: "Evaluación y sostenibilidad: el proyecto da frutos"
      }
    ];

    const app = document.getElementById("app");
    const btn = document.getElementById("btn");
    const screen = document.getElementById("screen");
    const mini = document.getElementById("mini");
    const group = document.getElementById("group");
    const nameBox = document.getElementById("name");
    const progress = document.getElementById("progress");
    const phaseText = document.getElementById("phaseText");

    let index = 0;
    let locked = false;
    let resultVisible = false;

    function renderProgress(){
      progress.innerHTML = grupos.map((g,i)=>`
        <div class="step ${i < index ? "done" : ""}">
          ${g.grupo}<br>${i < index ? "✓" : "Pendiente"}
        </div>
      `).join("");
    }

    function sparks(){
      for(let i=0;i<36;i++){
        const s = document.createElement("div");
        s.className = "spark";
        s.style.left = "58vw";
        s.style.top = "52vh";
        s.style.setProperty("--x", (Math.random()*520-260)+"px");
        s.style.setProperty("--y", (Math.random()*360-180)+"px");
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),950);
      }
    }

    function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

    async function draw(){
      if(locked) return;

      if(resultVisible){
        resultVisible = false;
        if(index >= grupos.length){
          mini.textContent = "Proyecto completado";
          group.textContent = "✓";
          nameBox.textContent = "Todos los grupos fueron sorteados";
          btn.disabled = true;
          return;
        }
        mini.textContent = "Siguiente etapa";
        group.textContent = grupos[index].grupo;
        nameBox.textContent = "Presiona sortear para continuar";
        btn.textContent = "Sortear";
        return;
      }

      locked = true;
      btn.disabled = true;

      const actual = grupos[index];
      mini.textContent = "Sorteando expositor";
      group.textContent = actual.grupo;
      nameBox.classList.add("roll");
      screen.classList.add("rolling");

      let n = 0;
      const roulette = setInterval(()=>{
        nameBox.textContent = actual.nombres[n % actual.nombres.length];
        n++;
      }, 85);

      await wait(2800);

      clearInterval(roulette);
      nameBox.classList.remove("roll");
      screen.classList.remove("rolling");

      mini.textContent = "Le tocó exponer a:";
      group.textContent = actual.grupo;
      nameBox.textContent = actual.elegido;

      index++;
      app.className = "app phase-" + index;
      phaseText.textContent = actual.fase;
      renderProgress();
      sparks();

      btn.disabled = false;
      btn.textContent = index < grupos.length ? "Ver siguiente sorteo" : "Finalizar";
      resultVisible = true;
      locked = false;
    }

    btn.addEventListener("click", draw);
    renderProgress();
  </script>
</body>
</html>
